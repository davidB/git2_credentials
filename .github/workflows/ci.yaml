name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - "releases/*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os.imageName }}
    strategy:
      matrix:
        os:
          - imageName: ubuntu-latest
          - imageName: macOS-latest
          - imageName: windows-latest

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          cache: false
          cache_save: false
      - run: mise run ci
